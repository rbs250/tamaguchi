<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f05f5f">
  <meta property="og:title" content="Tamaguchi">
  <meta property="og:description" content="A classic 8-bit virtual pet that remembers your visits.">
  <meta property="og:image" content="assets/tamaguchi-device.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="assets/tamaguchi-device.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Tamaguchi">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/tamaguchi-device.png">
  <link rel="preload" href="assets/tamaguchi-device-cutout.png" as="image">
  <title>Tamaguchi</title>
  <style>
    :root {
      --shell: #f05f5f;
      --shell-dark: #9f343a;
      --shell-light: #ff9d88;
      --screen: #b9c986;
      --screen-dark: #2a3420;
      --screen-dim: #6f7f55;
      --cream: #fff7da;
      --button: #f8d64e;
      --button-dark: #a2701f;
      --ink: #211d18;
      --shadow: rgba(19, 15, 10, 0.28);
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow-x: hidden;
      background:
        linear-gradient(45deg, rgba(33, 29, 24, 0.08) 25%, transparent 25%) 0 0 / 24px 24px,
        linear-gradient(45deg, transparent 75%, rgba(33, 29, 24, 0.08) 75%) 0 0 / 24px 24px,
        linear-gradient(45deg, transparent 75%, rgba(33, 29, 24, 0.08) 75%) 12px 12px / 24px 24px,
        linear-gradient(45deg, rgba(33, 29, 24, 0.08) 25%, transparent 25%) 12px 12px / 24px 24px,
        #9dcbd0;
      color: var(--ink);
      font-family: "Courier New", Consolas, monospace;
      padding: 22px;
    }

    .wrap {
      width: min(94vw, 620px);
      display: grid;
      justify-items: center;
      gap: 8px;
    }

    .device {
      position: relative;
      width: min(94vw, 590px);
      aspect-ratio: 1;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      display: block;
      padding: 0;
    }

    .device-art-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
      filter: drop-shadow(0 28px 30px rgba(33, 29, 24, 0.22));
    }

    .chain,
    .brand {
      display: none;
    }

    .screen-bezel {
      position: absolute;
      left: 34.2%;
      top: 34.9%;
      width: 32.2%;
      height: 32.7%;
      padding: 0;
      border: 0;
      border-radius: 5px;
      background: transparent;
      box-shadow: none;
      overflow: hidden;
    }

    .screen {
      width: 100%;
      height: 100%;
      border: 0;
      border-radius: 3px;
      background: var(--screen);
      box-shadow: inset 0 0 0 2px rgba(42, 52, 32, 0.12);
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: var(--screen);
      opacity: 0.95;
    }

    .controls {
      position: absolute;
      inset: 0;
      width: 100%;
      margin: 0;
      display: block;
      pointer-events: none;
    }

    .control {
      position: absolute;
      width: 7.35%;
      border: 0;
      border-radius: 50%;
      aspect-ratio: 1;
      background: transparent;
      display: grid;
      place-items: center;
      box-shadow: none;
      cursor: pointer;
      pointer-events: auto;
      touch-action: manipulation;
      font-size: 0;
      z-index: 3;
      padding: 0;
    }

    .control img {
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
      image-rendering: auto;
    }

    .control[data-key="a"] {
      left: 32.75%;
      top: 76.18%;
    }

    .control[data-key="b"] {
      left: 45.9%;
      top: 78.05%;
    }

    .control[data-key="c"] {
      left: 58.98%;
      top: 76.18%;
    }

    .control:active,
    .control.is-down {
      transform: scale(0.92);
      background: rgba(255, 232, 122, 0.3);
      box-shadow: inset 0 0 0 3px rgba(92, 48, 19, 0.36);
    }

    .labels {
      position: absolute;
      left: 30.7%;
      top: 86.3%;
      width: 42.8%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      margin: 0;
      color: #fff7da;
      font-weight: 900;
      text-align: center;
      text-shadow: 1px 2px 0 #6f2a2e;
      font-size: clamp(0.45rem, 1.7vw, 0.78rem);
    }

    @media (max-width: 440px) {
      body {
        padding: 12px;
      }

      .device {
        width: min(98vw, 590px);
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="device" aria-label="Tamaguchi virtual pet">
      <img class="device-art-bg" src="assets/tamaguchi-device-cutout.png" alt="" aria-hidden="true">
      <div class="chain" aria-hidden="true"></div>
      <div class="brand">TAMAGUCHI</div>
      <div class="screen-bezel">
        <div class="screen">
          <canvas id="game" width="160" height="128" aria-label="Tamaguchi game screen"></canvas>
        </div>
      </div>
      <div class="controls" aria-label="Game controls">
        <button class="control" data-key="a" aria-label="A select">
          <img src="assets/key-a-web.png" alt="" aria-hidden="true">
          A
        </button>
        <button class="control" data-key="b" aria-label="B confirm">
          <img src="assets/key-b-web.png" alt="" aria-hidden="true">
          B
        </button>
        <button class="control" data-key="c" aria-label="C cancel">
          <img src="assets/key-c-web.png" alt="" aria-hidden="true">
          C
        </button>
      </div>
      <div class="labels" aria-hidden="true">
        <span>SELECT</span>
        <span>OK</span>
        <span>BACK</span>
      </div>
    </section>
  </main>

  <script>
    (() => {
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width;
      const H = canvas.height;
      const SAVE_KEY = "tamaguchi.save.v1";
      const TICK_SECONDS = 12;
      const POOP_SECONDS = 80;
      const HATCH_SECONDS = 45;
      const VISIT_GAP_SECONDS = 75;
      const OFFLINE_CAP_TICKS = 240;
      const CALL_RESPONSE_SECONDS = 150;
      const CALL_COOLDOWN_SECONDS = 80;
      const DEATH_AGE_MINUTES = 96;
      const STATUS_PAGES = 6;
      const STAGES = ["EGG", "BABY", "CHILD", "TEEN", "ADULT"];
      const ADULT_FORMS = ["MAME", "KUCHI", "MASK", "NYORO"];
      const LCD_ASSET_NAMES = [
        "pet-egg", "pet-baby", "pet-child", "pet-teen", "pet-adult-mame", "pet-adult-kuchi", "pet-adult-mask", "pet-adult-nyoro",
        "icon-status", "icon-food", "icon-game", "icon-clean", "icon-med", "icon-light", "icon-discipline", "icon-attention",
        "obj-poop", "obj-meal", "obj-snack", "obj-med", "obj-sparkle", "obj-sick", "obj-sleep", "obj-bubbles", "obj-heart", "obj-tear", "obj-clock", "obj-battery",
        "game-cup-left", "game-cup-right", "game-star", "game-ball", "game-flag", "game-burst", "game-arrow-left", "game-arrow-right",
        "emo-smile", "emo-sad", "emo-sick", "emo-angry", "emo-sleepy", "emo-alert", "emo-music", "emo-heart", "emo-crack", "emo-call"
      ];

      const menus = [
        { key: "status", label: "STAT" },
        { key: "food", label: "FOOD" },
        { key: "play", label: "GAME" },
        { key: "clean", label: "CLEAN" },
        { key: "med", label: "MED" },
        { key: "light", label: "LIGHT" },
        { key: "discipline", label: "TRAIN" },
        { key: "attention", label: "CALL" }
      ];

      const defaults = () => {
        const now = Date.now();
        return {
        version: 3,
        createdAt: now,
        firstSeenAt: now,
        bornAt: now,
        hatchAt: now + HATCH_SECONDS * 1000,
        eggHatched: false,
        dead: false,
        diedAt: null,
        deathCause: "",
        lastDeathCause: "",
        generation: 1,
        lastStage: 0,
        form: "EGG",
        lastForm: "",
        bestAgeMinutes: 0,
        lastTick: now,
        lastPoop: now,
        lastCallAt: 0,
        call: null,
        lastVisitAt: null,
        lastSeenAt: now,
        lastAwayMs: 0,
        totalAwayMs: 0,
        longestAwayMs: 0,
        visitCount: 0,
        streakDays: 0,
        lastVisitDay: "",
        memories: [],
        careScore: 0,
        lastCareAt: null,
        callsAnswered: 0,
        callsMissed: 0,
        careActions: {
          meals: 0,
          snacks: 0,
          games: 0,
          cleans: 0,
          meds: 0,
          lights: 0,
          trains: 0
        },
        hunger: 72,
        happy: 70,
        energy: 78,
        hygiene: 85,
        health: 90,
        discipline: 12,
        weight: 5,
        poop: 0,
        sick: false,
        sickSince: null,
        medDoses: 0,
        sleeping: false,
        lightOn: true,
        careMisses: 0,
        menuIndex: 0,
        mode: "idle",
        page: 0,
        foodIndex: 0,
        nextGameKind: "move",
        message: "EGG!",
        messageUntil: Date.now() + 2500,
        game: null
      };
      };

      let state = load();
      let animationTick = 0;
      let audioCtx = null;
      let action = null;
      const heldKeys = new Set();
      const lcdSprites = Object.fromEntries(LCD_ASSET_NAMES.map((name) => {
        const image = new Image();
        image.onload = draw;
        image.src = `assets/lcd/${name}.png`;
        return [name, image];
      }));
      registerVisit();
      applyTime(true);
      save();

      function load() {
        const base = defaults();
        try {
          const raw = localStorage.getItem(SAVE_KEY);
          if (!raw) return base;
          const saved = JSON.parse(raw);
          if (!saved) return base;
          const merged = { ...base, ...saved, mode: "idle", game: null };
          merged.version = 3;
          merged.memories = Array.isArray(saved.memories) ? saved.memories.slice(0, 8) : [];
          merged.careActions = { ...base.careActions, ...(saved.careActions || {}) };
          merged.call = saved.call || null;
          if (saved.eggHatched === undefined) {
            merged.eggHatched = true;
            merged.hatchAt = merged.bornAt;
            merged.lastStage = Math.max(1, saved.lastStage || 1);
            merged.form = saved.form || STAGES[Math.min(merged.lastStage, STAGES.length - 1)];
          }
          return merged;
        } catch {
          return base;
        }
      }

      function save() {
        state.lastSeenAt = Date.now();
        const saved = { ...state, game: null, mode: "idle" };
        localStorage.setItem(SAVE_KEY, JSON.stringify(saved));
      }

      function clamp(value, min = 0, max = 100) {
        return Math.max(min, Math.min(max, value));
      }

      function stat(value, delta) {
        return clamp(Math.round(value + delta));
      }

      function shortDuration(ms) {
        const seconds = Math.max(0, Math.floor(ms / 1000));
        const days = Math.floor(seconds / 86400);
        const hours = Math.floor((seconds % 86400) / 3600);
        const minutes = Math.floor((seconds % 3600) / 60);
        if (days > 0) return `${days}D ${hours}H`;
        if (hours > 0) return `${hours}H ${minutes}M`;
        if (minutes > 0) return `${minutes}M`;
        return `${seconds}S`;
      }

      function dayKey(at = Date.now()) {
        const d = new Date(at);
        return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
      }

      function clipText(value, max = 15) {
        const textValue = String(value || "");
        return textValue.length > max ? textValue.slice(0, max - 1) + "." : textValue;
      }

      function remember(textValue, at = Date.now()) {
        state.memories = Array.isArray(state.memories) ? state.memories : [];
        const last = state.memories[0];
        if (last && last.text === textValue && at - last.at < 10000) return;
        state.memories.unshift({ at, text: textValue });
        state.memories = state.memories.slice(0, 8);
      }

      function registerVisit() {
        const now = Date.now();
        const previous = state.lastSeenAt || state.lastVisitAt || state.lastTick || now;
        const awayMs = Math.max(0, now - previous);
        state.visitCount = (state.visitCount || 0) + 1;
        state.lastAwayMs = awayMs;

        const today = dayKey(now);
        if (state.lastVisitDay !== today) {
          const yesterday = dayKey(now - 86400000);
          state.streakDays = state.lastVisitDay === yesterday ? (state.streakDays || 0) + 1 : 1;
          state.lastVisitDay = today;
          if (state.streakDays > 1) remember(`STREAK ${state.streakDays}D`, now);
        }

        if (awayMs >= VISIT_GAP_SECONDS * 1000) {
          state.totalAwayMs = Math.max(0, state.totalAwayMs || 0) + awayMs;
          state.longestAwayMs = Math.max(state.longestAwayMs || 0, awayMs);
          remember(`BACK AFTER ${shortDuration(awayMs)}`, now);
          setMessage(`BACK ${shortDuration(awayMs)}`, 2600);
        } else if (state.visitCount <= 1) {
          remember("FIRST VISIT", now);
          setMessage(state.eggHatched ? "HELLO!" : "EGG!", 2200);
        } else {
          setMessage("HI AGAIN", 1600);
        }

        state.lastVisitAt = now;
        state.lastSeenAt = now;
      }

      function recordCare(kind, memo) {
        state.careScore = (state.careScore || 0) + 1;
        state.lastCareAt = Date.now();
        state.careActions = state.careActions || {};
        state.careActions[kind] = (state.careActions[kind] || 0) + 1;
        if (memo) remember(memo);
      }

      function setAction(kind, duration = 1200) {
        const now = Date.now();
        action = { kind, at: now, until: now + duration };
      }

      function activeAction() {
        if (!action) return null;
        if (Date.now() > action.until) {
          action = null;
          return null;
        }
        return action;
      }

      function actionProgress(current = activeAction()) {
        if (!current) return 1;
        return clamp((Date.now() - current.at) / Math.max(1, current.until - current.at), 0, 1);
      }

      function ageMinutes() {
        if (!state.eggHatched) return 0;
        const end = state.dead && state.diedAt ? state.diedAt : Date.now();
        return Math.max(0, Math.floor((end - state.bornAt) / 60000));
      }

      function stageIndex() {
        if (!state.eggHatched) return 0;
        const age = ageMinutes();
        if (age < 2) return 1;
        if (age < 8) return 2;
        if (age < 18) return 3;
        return 4;
      }

      function healthyWeight() {
        const stage = stageIndex();
        if (stage <= 1) return 6;
        if (stage === 2) return 12;
        if (stage === 3) return 20;
        return 30;
      }

      function setMessage(text, duration = 1700) {
        state.message = text;
        state.messageUntil = Date.now() + duration;
      }

      function eggWaiting() {
        if (state.eggHatched) return false;
        const left = Math.max(0, Math.ceil((state.hatchAt - Date.now()) / 1000));
        setMessage(left > 0 ? `HATCH ${left}` : "HATCH!", 1300);
        return true;
      }

      function getNeedCount() {
        if (!state.eggHatched || state.dead) return 0;
        return [
          state.hunger < 25,
          state.happy < 25,
          state.energy < 18,
          state.hygiene < 25,
          state.health < 45,
          state.poop > 0,
          state.sick,
          state.sleeping && state.lightOn
        ].filter(Boolean).length;
      }

      function callLabel(kind) {
        return {
          hunger: "FOOD",
          happy: "GAME",
          poop: "CLEAN",
          sick: "MED",
          light: "LIGHT",
          discipline: "TRAIN"
        }[kind] || "CALL";
      }

      function currentNeedKind() {
        if (!state.eggHatched || state.dead) return "";
        if (state.sick || state.health < 35) return "sick";
        if (state.sleeping && state.lightOn) return "light";
        if (state.poop > 0 && state.hygiene < 55) return "poop";
        if (state.hunger < 22) return "hunger";
        if (state.happy < 22) return "happy";
        return "";
      }

      function createCall(kind, now = Date.now()) {
        if (!kind || state.call || !state.eggHatched || state.dead) return;
        state.call = {
          kind,
          at: now,
          expiresAt: now + CALL_RESPONSE_SECONDS * 1000
        };
        state.lastCallAt = now;
        remember(`CALL ${callLabel(kind)}`, now);
        setMessage(callLabel(kind), 1900);
        feedback(kind === "discipline" ? "press" : "bad");
        save();
      }

      function missCall(now = Date.now()) {
        if (!state.call) return;
        const missed = callLabel(state.call.kind);
        state.callsMissed = (state.callsMissed || 0) + 1;
        state.careMisses = (state.careMisses || 0) + 1;
        state.health = stat(state.health, -6);
        state.call = null;
        state.lastCallAt = now;
        remember(`MISSED ${missed}`, now);
        setMessage("MISSED", 1900);
        feedback("bad");
        save();
      }

      function answerCall(...kinds) {
        if (!state.call || !kinds.includes(state.call.kind)) return false;
        const answered = callLabel(state.call.kind);
        state.call = null;
        state.callsAnswered = (state.callsAnswered || 0) + 1;
        remember(`ANSWER ${answered}`);
        return true;
      }

      function maybeCall(now = Date.now(), allowRandom = false) {
        if (!state.eggHatched || state.dead) return;
        if (state.call) {
          if (now >= state.call.expiresAt) missCall(now);
          return;
        }
        if (now - (state.lastCallAt || 0) < CALL_COOLDOWN_SECONDS * 1000) return;

        const need = currentNeedKind();
        if (need) {
          createCall(need, now);
          return;
        }

        const falseCallReady = allowRandom
          && !state.sleeping
          && state.discipline < 100
          && state.hunger > 60
          && state.happy > 55
          && state.hygiene > 60
          && state.health > 55
          && Math.random() < 0.08;
        if (falseCallReady) createCall("discipline", now);
      }

      function chooseAdultForm() {
        const misses = state.careMisses || 0;
        const trained = state.discipline || 0;
        const healthy = state.health || 0;
        const happy = state.happy || 0;
        if (misses <= 6 && trained >= 58 && healthy >= 70 && happy >= 55) return ADULT_FORMS[0];
        if (misses <= 14 && healthy >= 50) return ADULT_FORMS[1];
        if (trained < 35 || happy < 35) return ADULT_FORMS[2];
        return ADULT_FORMS[3];
      }

      function markDeath(cause) {
        if (state.dead) return;
        const now = Date.now();
        const lived = ageMinutes();
        state.dead = true;
        state.diedAt = now;
        state.deathCause = cause;
        state.lastDeathCause = cause;
        state.lastForm = state.form || state.lastForm || "PET";
        state.bestAgeMinutes = Math.max(state.bestAgeMinutes || 0, lived);
        state.call = null;
        state.game = null;
        state.mode = "idle";
        state.sleeping = false;
        state.lightOn = true;
        remember(`${state.lastForm} LEFT`, now);
        setMessage(cause, 3200);
        setAction("death", 2400);
        feedback("bad");
        save();
      }

      function startNewGeneration() {
        const now = Date.now();
        const old = state;
        const next = defaults();
        const nextGeneration = (old.generation || 1) + 1;
        const carriedMemories = Array.isArray(old.memories) ? old.memories.slice(0, 7) : [];
        state = {
          ...next,
          generation: nextGeneration,
          firstSeenAt: old.firstSeenAt || next.firstSeenAt,
          visitCount: old.visitCount || 0,
          totalAwayMs: old.totalAwayMs || 0,
          longestAwayMs: old.longestAwayMs || 0,
          streakDays: old.streakDays || 0,
          lastVisitDay: old.lastVisitDay || "",
          bestAgeMinutes: Math.max(old.bestAgeMinutes || 0, ageMinutes()),
          lastForm: old.lastForm || old.form || "",
          lastDeathCause: old.deathCause || old.lastDeathCause || "",
          memories: [{ at: now, text: `GEN ${nextGeneration} EGG` }, ...carriedMemories].slice(0, 8),
          message: "NEW EGG",
          messageUntil: now + 2600
        };
        feedback("evolve");
        setAction("new", 2400);
        save();
      }

      function handleLifecycle(now = Date.now()) {
        if (state.dead) return;
        if (!state.eggHatched && now >= state.hatchAt) {
          state.eggHatched = true;
          state.bornAt = state.hatchAt;
          state.lastTick = state.hatchAt;
          state.lastPoop = state.hatchAt;
          state.lastStage = 1;
          state.form = "BABY";
          remember("HATCHED");
          setMessage("HATCH!", 2600);
          setAction("hatch", 2400);
          feedback("evolve");
        }

        const currentStage = stageIndex();
        if (state.lastStage === undefined || state.lastStage === null) {
          state.lastStage = currentStage;
        }

        if (state.eggHatched && currentStage !== state.lastStage) {
          state.lastStage = currentStage;
          state.form = currentStage === 4 ? chooseAdultForm() : STAGES[currentStage];
          remember(`GREW ${state.form}`);
          setMessage(currentStage === 4 ? state.form : `GROW ${STAGES[currentStage]}`, 2800);
          setAction("evolve", 2600);
          feedback("evolve");
        }
      }

      function applyTime() {
        const now = Date.now();
        if (state.dead) {
          state.lastTick = now;
          return;
        }
        handleLifecycle(now);
        if (!state.eggHatched) {
          state.lastTick = now;
          state.lastPoop = now;
          return;
        }
        const elapsed = Math.max(0, Math.min(now - state.lastTick, 1000 * 60 * 60 * 3));
        const rawUnits = Math.floor(elapsed / (TICK_SECONDS * 1000));
        const units = Math.min(rawUnits, OFFLINE_CAP_TICKS);

        if (units > 0) {
          for (let i = 0; i < units; i += 1) {
            const hour = new Date(state.lastTick + i * TICK_SECONDS * 1000).getHours();
            const bedtime = hour >= 22 || hour < 7;
            if (bedtime && !state.sleeping && state.energy < 86) {
              state.sleeping = true;
              remember("BEDTIME");
              setMessage("SLEEPY", 1800);
            }

            const sleepBoost = state.sleeping || !state.lightOn;
            state.hunger = stat(state.hunger, -1);
            state.happy = stat(state.happy, sleepBoost ? -0.2 : -0.8);
            state.hygiene = stat(state.hygiene, state.poop > 0 ? -1.6 : -0.55);
            state.energy = stat(state.energy, sleepBoost ? 2.4 : -0.65);

            if (state.weight > healthyWeight() + 12) {
              state.energy = stat(state.energy, -0.35);
              state.health = stat(state.health, -0.35);
            }

            if (state.hunger < 20 || state.hygiene < 20 || state.happy < 15) {
              state.health = stat(state.health, -1.5);
            } else if (!state.sick && state.health < 96) {
              state.health = stat(state.health, 0.35);
            }

            if (state.sick) state.health = stat(state.health, -0.55);

            if (state.energy >= 96 && state.sleeping) {
              state.sleeping = false;
              state.lightOn = true;
              setMessage("GOOD MORN", 1800);
            }
          }

          state.lastTick += rawUnits * TICK_SECONDS * 1000;
        }

        const poopUnits = Math.floor(Math.max(0, now - state.lastPoop) / (POOP_SECONDS * 1000));
        if (poopUnits > 0) {
          state.poop = Math.min(4, state.poop + poopUnits);
          state.lastPoop += poopUnits * POOP_SECONDS * 1000;
        }

        if (!state.sick && (state.health < 35 || (state.poop >= 3 && Math.random() < 0.02))) {
          state.sick = true;
          state.sickSince = now;
          state.medDoses = 0;
          remember("GOT SICK");
          setMessage("SICK!", 2200);
          feedback("bad");
        }

        if (!state.sleeping && state.energy < 8) {
          state.sleeping = true;
          remember("FELL ASLEEP");
          setMessage("SLEEPY", 1800);
        }

        maybeCall(now, units > 0);

        if (state.health <= 0 || (state.hunger <= 0 && state.hygiene <= 0 && state.health < 20)) {
          markDeath("NEGLECT");
          return;
        }

        if (state.sick && state.sickSince && now - state.sickSince > 12 * 60000) {
          markDeath("SICKNESS");
          return;
        }

        if (ageMinutes() > DEATH_AGE_MINUTES && state.health < 45) {
          markDeath("OLD AGE");
          return;
        }

        handleLifecycle(now);
      }

      function press(key) {
        applyTime();
        feedback("press");

        if (state.dead) {
          if (key === "b") {
            startNewGeneration();
          } else {
            setMessage("B NEW", 1800);
          }
          save();
          draw();
          return;
        }

        if (key === "c") {
          if (state.mode !== "idle") {
            state.mode = "idle";
            state.game = null;
            setMessage(menus[state.menuIndex].label, 900);
          } else {
            state.messageUntil = 0;
          }
          save();
          draw();
          return;
        }

        if (state.mode === "idle") {
          if (key === "a") {
            state.menuIndex = (state.menuIndex + 1) % menus.length;
            setMessage(menus[state.menuIndex].label, 900);
          } else if (key === "b") {
            activateMenu(menus[state.menuIndex].key);
          }
        } else if (state.mode === "status") {
          if (key === "a" || key === "b") {
            state.page = (state.page + 1) % STATUS_PAGES;
          }
        } else if (state.mode === "food") {
          if (key === "a") {
            state.foodIndex = state.foodIndex === 0 ? 1 : 0;
          } else if (key === "b") {
            feed(state.foodIndex);
          }
        } else if (state.mode === "game") {
          playInput(key);
        }

        save();
        draw();
      }

      function activateMenu(key) {
        switch (key) {
          case "status":
            state.mode = "status";
            state.page = 0;
            break;
          case "food":
            state.mode = "food";
            state.foodIndex = 0;
            break;
          case "play":
            startGame();
            break;
          case "clean":
            clean();
            break;
          case "med":
            medicate();
            break;
          case "light":
            toggleLight();
            break;
          case "discipline":
            discipline();
            break;
          case "attention":
            attention();
            break;
          default:
            break;
        }
      }

      function feed(index) {
        if (eggWaiting()) return;
        if (state.sleeping) {
          setMessage("ZZZ...", 1200);
          return;
        }
        if (state.sick) {
          setMessage("SICK", 1200);
          return;
        }
        if (state.poop > 0) {
          setMessage("MESSY", 1200);
          return;
        }

        if (index === 0) {
          if (state.hunger > 94) {
            setMessage("FULL", 1300);
            return;
          }
          state.hunger = stat(state.hunger, 24);
          state.happy = stat(state.happy, 3);
          state.weight = Math.min(99, state.weight + 1);
          answerCall("hunger");
          recordCare("meals", "ATE MEAL");
          feedback("care");
          setAction("meal", 1200);
          setMessage("MEAL", 1300);
        } else {
          state.hunger = stat(state.hunger, 8);
          state.happy = stat(state.happy, 16);
          state.health = stat(state.health, state.health > 55 ? -2 : 0);
          state.weight = Math.min(99, state.weight + 2);
          answerCall("hunger", "happy");
          recordCare("snacks", "ATE SNACK");
          feedback("care");
          setAction("snack", 1200);
          setMessage("SNACK", 1300);
        }
        state.mode = "idle";
      }

      function clean() {
        if (eggWaiting()) return;
        if (state.poop > 0) {
          state.poop = 0;
          state.hygiene = stat(state.hygiene, 34);
          state.happy = stat(state.happy, 5);
          answerCall("poop");
          recordCare("cleans", "CLEANED");
          feedback("care");
          setAction("clean", 1400);
          setMessage("CLEAN!", 1600);
        } else {
          state.hygiene = stat(state.hygiene, 18);
          state.happy = stat(state.happy, -1);
          recordCare("cleans", "BATH");
          feedback("care");
          setAction("clean", 1300);
          setMessage("BATH", 1400);
        }
      }

      function medicate() {
        if (eggWaiting()) return;
        if (state.sick || state.health < 60) {
          state.medDoses = (state.medDoses || 0) + 1;
          state.health = stat(state.health, 24);
          state.happy = stat(state.happy, -4);
          const cured = !state.sick || state.medDoses >= 2 || state.health >= 72;
          if (cured) {
            state.sick = false;
            state.sickSince = null;
            state.medDoses = 0;
            answerCall("sick");
          }
          recordCare("meds", "TOOK MEDS");
          feedback("care");
          setAction(cured ? "med-cure" : "med", 1400);
          setMessage(cured ? "MED OK" : "AGAIN", 1600);
        } else {
          setMessage("NO NEED", 1400);
        }
      }

      function toggleLight() {
        if (eggWaiting()) return;
        if (!state.sleeping) {
          setMessage("AWAKE", 1300);
          return;
        }
        state.lightOn = !state.lightOn;
        if (!state.lightOn) {
          state.sleeping = true;
          state.energy = stat(state.energy, 3);
          answerCall("light");
          recordCare("lights", "LIGHTS OUT");
          feedback("care");
          setAction("sleep", 1200);
          setMessage("LIGHT OFF", 1600);
        } else {
          if (state.energy > 35) state.sleeping = false;
          recordCare("lights", "LIGHTS ON");
          feedback("care");
          setMessage("LIGHT ON", 1600);
        }
      }

      function discipline() {
        if (eggWaiting()) return;
        if (state.call && state.call.kind === "discipline") {
          state.discipline = stat(state.discipline, 12);
          state.happy = stat(state.happy, -3);
          answerCall("discipline");
          recordCare("trains", "TRAINED");
          feedback("care");
          setAction("train", 1200);
          setMessage("TRAINED", 1600);
        } else if (state.call) {
          state.happy = stat(state.happy, -6);
          feedback("bad");
          setAction("wrong", 1200);
          setMessage(`${callLabel(state.call.kind)}!`, 1400);
        } else {
          state.happy = stat(state.happy, -7);
          state.discipline = stat(state.discipline, 1);
          recordCare("trains", "SCOLDED");
          feedback("bad");
          setAction("scold", 1200);
          setMessage("NO CALL", 1300);
        }
      }

      function attention() {
        if (eggWaiting()) return;
        if (state.call) {
          const left = Math.max(0, Math.ceil((state.call.expiresAt - Date.now()) / 1000));
          setMessage(`${callLabel(state.call.kind)} ${left}`, 2200);
          return;
        }
        const needs = [];
        if (state.hunger < 25) needs.push("FOOD");
        if (state.happy < 25) needs.push("GAME");
        if ((state.sleeping && state.lightOn) || state.energy < 18) needs.push("LIGHT");
        if (state.hygiene < 25 || state.poop > 0) needs.push("CLEAN");
        if (state.health < 45 || state.sick) needs.push("MED");
        setMessage(needs.length ? needs.slice(0, 2).join("+") : "OK!", 2200);
      }

      function startGame() {
        if (eggWaiting()) return;
        if (state.sleeping) {
          setMessage("ZZZ...", 1200);
          return;
        }
        if (state.energy < 10) {
          setMessage("TIRED", 1300);
          return;
        }
        const kind = state.nextGameKind === "number" ? "number" : "move";
        state.nextGameKind = kind === "move" ? "number" : "move";
        state.mode = "game";
        state.game = newGameRound(kind, { round: 1, score: 0 });
      }

      function randomDigit(except = 0) {
        let value = 1 + Math.floor(Math.random() * 9);
        while (value === except) value = 1 + Math.floor(Math.random() * 9);
        return value;
      }

      function newGameRound(kind, carry) {
        if (kind === "number") {
          const current = randomDigit();
          return {
            kind,
            round: carry.round,
            score: carry.score,
            pick: 0,
            current,
            next: randomDigit(current),
            reveal: false,
            result: ""
          };
        }
        return {
          kind: "move",
          round: carry.round,
          score: carry.score,
          pick: 0,
          target: Math.random() < 0.5 ? 0 : 1,
          reveal: false,
          result: ""
        };
      }

      function playInput(key) {
        const game = state.game;
        if (!game) return;

        if (key === "a" && !game.reveal) {
          game.pick = game.pick === 0 ? 1 : 0;
        }

        if (key === "b" && !game.reveal) {
          const win = game.kind === "number"
            ? (game.pick === 0 ? game.next > game.current : game.next < game.current)
            : game.pick === game.target;
          game.reveal = true;
          game.result = win ? "HIT!" : "MISS";
          if (win) game.score += 1;
          setTimeout(() => {
            if (state.mode !== "game" || !state.game) return;
            if (state.game.round >= 5) {
              const score = state.game.score;
              state.happy = stat(state.happy, score * 5 + (score >= 3 ? 10 : 0));
              state.energy = stat(state.energy, -8);
              state.weight = Math.max(2, state.weight - (score >= 3 ? 1 : 0));
              answerCall("happy");
              recordCare("games", `PLAY ${score}/5`);
              feedback(score >= 3 ? "win" : "care");
              setAction(score >= 3 ? "game-win" : "game-miss", 1600);
              setMessage(`SCORE ${score}/5`, 2100);
              state.mode = "idle";
              state.game = null;
              save();
              draw();
              return;
            }
            state.game = newGameRound(state.game.kind || "move", {
              round: state.game.round + 1,
              score: state.game.score
            });
            draw();
          }, 950);
        }
      }

      function feedback(kind) {
        if (typeof navigator !== "undefined" && navigator.vibrate) {
          const pattern = kind === "bad" ? [25, 30, 25] : kind === "evolve" ? [20, 35, 20] : 12;
          navigator.vibrate(pattern);
        }

        if (kind === "bad") {
          beep(180, 0.08);
          setTimeout(() => beep(120, 0.1), 90);
        } else if (kind === "evolve") {
          beep(520, 0.07);
          setTimeout(() => beep(780, 0.07), 90);
          setTimeout(() => beep(1040, 0.09), 180);
        } else if (kind === "care") {
          beep(660, 0.055);
          setTimeout(() => beep(880, 0.055), 70);
        } else if (kind === "win") {
          beep(720, 0.055);
          setTimeout(() => beep(960, 0.065), 75);
        } else {
          beep(860, 0.035);
        }
      }

      function beep(frequency, duration) {
        const Audio = window.AudioContext || window.webkitAudioContext;
        if (!Audio) return;
        try {
          audioCtx = audioCtx || new Audio();
          if (audioCtx.state === "suspended") audioCtx.resume();
          const oscillator = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          oscillator.type = "square";
          oscillator.frequency.value = frequency;
          gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
          oscillator.connect(gain);
          gain.connect(audioCtx.destination);
          oscillator.start();
          oscillator.stop(audioCtx.currentTime + duration);
        } catch {
          audioCtx = null;
        }
      }

      function px(x, y, w = 1, h = 1, color = "#2a3420") {
        ctx.fillStyle = color;
        ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h));
      }

      function outline(x, y, w, h, color = "#2a3420") {
        px(x, y, w, 1, color);
        px(x, y + h - 1, w, 1, color);
        px(x, y, 1, h, color);
        px(x + w - 1, y, 1, h, color);
      }

      function text(value, x, y, size = 8, color = "#2a3420", align = "left") {
        ctx.fillStyle = color;
        ctx.font = `bold ${size}px "Courier New", monospace`;
        ctx.textBaseline = "top";
        ctx.textAlign = align;
        ctx.fillText(String(value).toUpperCase(), Math.round(x), Math.round(y));
        ctx.textAlign = "left";
      }

      function bar(x, y, value, label) {
        text(label, x, y - 1, 7);
        outline(x + 34, y, 45, 7);
        const fill = Math.max(0, Math.round(value / 100 * 41));
        for (let i = 0; i < fill; i += 4) px(x + 36 + i, y + 2, 2, 3);
      }

      function heartMeter(x, y, value, label) {
        text(label, x, y - 1, 7);
        const filled = Math.max(0, Math.min(4, Math.ceil(value / 25)));
        for (let i = 0; i < 4; i += 1) {
          const hx = x + 38 + i * 14;
          if (i < filled) {
            px(hx + 1, y + 1, 2, 2);
            px(hx + 5, y + 1, 2, 2);
            px(hx, y + 3, 8, 3);
            px(hx + 1, y + 6, 6, 2);
            px(hx + 3, y + 8, 2, 2);
          } else {
            outline(hx, y + 2, 8, 7);
            px(hx + 2, y + 1, 1, 1);
            px(hx + 5, y + 1, 1, 1);
          }
        }
      }

      function drawSpriteAt(name, x, y, maxW = null, maxH = null) {
        const image = lcdSprites[name];
        if (!image || !image.complete || !image.naturalWidth) return false;
        const ratio = Math.min(
          maxW ? maxW / image.naturalWidth : 1,
          maxH ? maxH / image.naturalHeight : 1,
          1
        );
        const width = Math.max(1, Math.round(image.naturalWidth * ratio));
        const height = Math.max(1, Math.round(image.naturalHeight * ratio));
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(image, Math.round(x), Math.round(y), width, height);
        return true;
      }

      function drawSprite(name, cx, cy, maxW = null, maxH = null) {
        const image = lcdSprites[name];
        if (!image || !image.complete || !image.naturalWidth) return false;
        const ratio = Math.min(
          maxW ? maxW / image.naturalWidth : 1,
          maxH ? maxH / image.naturalHeight : 1,
          1
        );
        const width = Math.max(1, Math.round(image.naturalWidth * ratio));
        const height = Math.max(1, Math.round(image.naturalHeight * ratio));
        return drawSpriteAt(name, cx - width / 2, cy - height / 2, maxW, maxH);
      }

      function draw() {
        applyTime();
        animationTick += 1;
        const dim = !state.lightOn && state.sleeping;
        ctx.clearRect(0, 0, W, H);
        px(0, 0, W, H, dim ? "#5e6a4b" : "#b9c986");

        if (!dim) {
          for (let y = 0; y < H; y += 4) px(0, y, W, 1, "rgba(42, 52, 32, 0.08)");
        }

        drawTopIcons(dim);
        drawRoom(dim);

        if (state.mode === "status") drawStatus();
        if (state.mode === "food") drawFood();
        if (state.mode === "game") drawGame();

        drawMessage(dim);
      }

      function drawTopIcons(dim) {
        const ink = dim ? "#2f3828" : "#2a3420";
        const bg = dim ? "#5e6a4b" : "#b9c986";
        for (let i = 0; i < menus.length; i += 1) {
          const x = 3 + i * 19;
          const active = state.mode === "idle" && state.menuIndex === i;
          outline(x - 1, 1, 17, 14, ink);
          if (active) px(x + 3, 13, 9, 2, ink);
          drawIcon(menus[i].key, x + 1, 3, ink);
        }

        if (state.call && (animationTick % 32 < 16)) {
          if (!drawSprite("emo-alert", 153, 8, 10, 11)) {
            px(151, 3, 5, 9, ink);
            px(153, 12, 2, 2, ink);
          }
        }
      }

      function drawIcon(key, x, y, color) {
        const iconMap = {
          status: "icon-status",
          food: "icon-food",
          play: "icon-game",
          clean: "icon-clean",
          med: "icon-med",
          light: "icon-light",
          discipline: "icon-discipline",
          attention: "icon-attention"
        };
        if (drawSpriteAt(iconMap[key], x + 1, y + 1, 13, 12)) return;
        const c = color;
        if (key === "status") {
          px(x, y + 8, 3, 3, c);
          px(x + 5, y + 5, 3, 6, c);
          px(x + 10, y + 2, 3, 9, c);
        }
        if (key === "food") {
          px(x + 2, y + 8, 10, 2, c);
          px(x + 4, y + 10, 6, 2, c);
          px(x + 5, y + 3, 4, 4, c);
          px(x + 8, y + 2, 2, 2, c);
        }
        if (key === "play") {
          px(x + 2, y + 5, 11, 5, c);
          px(x, y + 7, 15, 2, c);
          px(x + 4, y + 3, 2, 9, c);
          px(x + 9, y + 6, 2, 2, c);
          px(x + 12, y + 4, 2, 2, c);
        }
        if (key === "clean") {
          px(x + 2, y + 3, 10, 2, c);
          px(x + 4, y + 5, 6, 8, c);
          px(x + 3, y + 12, 8, 2, c);
        }
        if (key === "med") {
          px(x + 5, y + 2, 4, 11, c);
          px(x + 1, y + 6, 12, 4, c);
        }
        if (key === "light") {
          px(x + 4, y + 2, 7, 7, c);
          px(x + 5, y + 9, 5, 3, c);
          px(x + 6, y + 12, 3, 2, c);
        }
        if (key === "discipline") {
          px(x + 6, y + 2, 3, 8, c);
          px(x + 5, y + 11, 5, 3, c);
        }
        if (key === "attention") {
          px(x + 3, y + 3, 9, 9, c);
          px(x + 5, y + 5, 2, 2, color === "#2a3420" ? "#b9c986" : "#2a3420");
          px(x + 9, y + 5, 2, 2, color === "#2a3420" ? "#b9c986" : "#2a3420");
          px(x + 6, y + 10, 5, 1, color === "#2a3420" ? "#b9c986" : "#2a3420");
        }
      }

      function drawRoom(dim) {
        const ink = dim ? "#2f3828" : "#2a3420";
        if (state.dead) {
          drawDeath(ink);
          return;
        }
        if (!state.lightOn && state.sleeping) {
          if (!drawSprite("obj-sleep", 18, 34, 18, 15)) text("ZZZ", 15, 31, 9, ink);
        }

        for (let x = 0; x < W; x += 6) px(x, 101, 3, 1, ink);
        px(0, 106, W, 1, ink);

        for (let i = 0; i < state.poop; i += 1) {
          drawPoop(12 + i * 12, 91, ink);
        }

        const center = petCenter();
        drawPet(center.x, center.y, ink);
        drawLifeEffects(center.x, center.y, ink, dim);

        if (state.sick) {
          if (!drawSprite("obj-sick", 114, 47, 16, 16)) {
            px(112, 45, 5, 5, ink);
            px(114, 40, 1, 13, ink);
            px(110, 44, 9, 1, ink);
          }
        }

        const clock = new Date();
        const hours = String(clock.getHours()).padStart(2, "0");
        const minutes = String(clock.getMinutes()).padStart(2, "0");
        text(`${hours}:${minutes}`, 123, 113, 7, ink);
      }

      function petCenter() {
        const current = activeAction();
        let x = 75;
        let y = 66;

        if (state.eggHatched && !state.sleeping && state.mode === "idle" && !state.dead) {
          const walk = [0, 2, 4, 7, 10, 12, 10, 7, 4, 2, 0, -2, -5, -8, -10, -8, -5, -2];
          x += walk[Math.floor(animationTick / 10) % walk.length];
          y += Math.floor(animationTick / 16) % 2;
        }

        if (state.call && animationTick % 18 < 9) x += 2;

        if (current) {
          const p = actionProgress(current);
          if (["meal", "snack", "clean", "med", "med-cure", "game-win", "hatch", "evolve", "new"].includes(current.kind)) {
            y -= Math.round(Math.sin(p * Math.PI) * 5);
          }
          if (["wrong", "scold", "game-miss"].includes(current.kind)) {
            x += Math.floor(animationTick / 3) % 2 ? -3 : 3;
          }
        }

        return { x, y };
      }

      function drawLifeEffects(cx, cy, ink, dim) {
        const current = activeAction();
        const bg = dim ? "#5e6a4b" : "#b9c986";

        if (state.call && animationTick % 36 < 25) {
          if (!drawSprite("emo-call", cx + 27, cy - 24, 15, 15)) text("!", cx + 24, cy - 28, 11, ink);
          drawMotionMark(cx - 25, cy - 10, ink, animationTick % 18 < 9 ? -1 : 1);
        }

        if (!current && !state.sleeping && state.mode === "idle") {
          const mood = moodFace();
          if (mood === "happy" && animationTick % 150 < 45) {
            drawSprite("emo-heart", cx + 25, cy - 19, 11, 11);
          } else if (mood === "sad" && animationTick % 140 < 45) {
            drawSprite("obj-tear", cx + 22, cy - 11, 8, 10);
          } else if (mood === "neutral" && animationTick % 210 < 42) {
            drawSprite("emo-music", cx + 23, cy - 18, 11, 13);
          }
        }

        if (!current) return;
        const p = actionProgress(current);
        const wave = Math.round(Math.sin(p * Math.PI) * 6);

        if (current.kind === "meal" || current.kind === "snack") {
          const item = current.kind === "meal" ? "obj-meal" : "obj-snack";
          drawSprite(item, cx - 27 + Math.round(p * 14), cy + 4 - wave, 17, 13);
          drawSprite("emo-heart", cx + 24, cy - 18 - wave, 11, 11);
        } else if (current.kind === "clean") {
          drawSprite("obj-bubbles", cx - 24, cy - 14 - wave, 15, 14);
          drawSprite("obj-bubbles", cx + 23, cy - 2 - Math.round(wave / 2), 13, 12);
          drawSprite("obj-sparkle", cx, cy - 25, 12, 12);
        } else if (current.kind === "med" || current.kind === "med-cure") {
          drawSprite("obj-med", cx - 24 + Math.round(p * 12), cy - 9, 14, 14);
          drawSprite(current.kind === "med-cure" ? "obj-sparkle" : "emo-sick", cx + 25, cy - 18, 13, 13);
        } else if (current.kind === "train" || current.kind === "scold" || current.kind === "wrong") {
          drawSprite(current.kind === "train" ? "emo-alert" : "emo-angry", cx + 24, cy - 19, 13, 13);
          drawMotionMark(cx - 25, cy - 5, ink, -1);
          drawMotionMark(cx + 25, cy - 5, ink, 1);
        } else if (current.kind === "game-win") {
          drawSprite("game-burst", cx, cy - 24, 18, 18);
          drawSprite("emo-heart", cx + 25, cy - 12, 12, 12);
        } else if (current.kind === "game-miss") {
          drawSprite("obj-tear", cx + 24, cy - 9, 9, 11);
        } else if (["hatch", "evolve", "new"].includes(current.kind)) {
          drawSprite("obj-sparkle", cx - 25, cy - 18 - wave, 13, 13);
          drawSprite("obj-sparkle", cx + 25, cy - 5, 11, 11);
          drawSprite("game-burst", cx, cy - 27, 18, 18);
        } else if (current.kind === "sleep") {
          drawSprite("obj-sleep", cx + 24, cy - 20, 16, 14);
        }

        if (p > 0.55 && ["meal", "snack", "med-cure", "game-win", "evolve"].includes(current.kind)) {
          px(cx - 18, cy + 20, 36, 1, bg);
        }
      }

      function drawMotionMark(x, y, ink, side = 1) {
        px(x, y, 2, 2, ink);
        px(x + side * 4, y + 4, 2, 2, ink);
        px(x + side * 7, y + 9, 2, 2, ink);
      }

      function drawDeath(ink) {
        for (let x = 0; x < W; x += 6) px(x, 101, 3, 1, ink);
        px(0, 106, W, 1, ink);
        drawSprite("emo-crack", 75, 43, 18, 18);
        px(61, 57, 30, 36, ink);
        px(64, 52, 24, 9, ink);
        px(65, 60, 22, 29, "#b9c986");
        text("RIP", 67, 64, 8, ink);
        text(clipText(state.lastForm || "PET", 8), 63, 76, 7, ink);
        text("B NEW", 61, 92, 8, ink);
        if (state.deathCause) text(clipText(state.deathCause, 10), 57, 113, 7, ink);
      }

      function drawPoop(x, y, ink) {
        if (drawSprite("obj-poop", x + 7, y + 6, 14, 12)) return;
        px(x + 5, y, 4, 2, ink);
        px(x + 3, y + 2, 8, 3, ink);
        px(x + 1, y + 5, 12, 3, ink);
        px(x, y + 8, 14, 3, ink);
      }

      function drawPet(cx, cy, ink) {
        const stage = stageIndex();
        if (stage === 0) {
          drawEgg(cx, cy, ink);
          return;
        }
        const lively = !state.sleeping && !state.dead;
        const bounce = lively ? (animationTick % 28 < 14 ? 0 : 2) : 0;
        const spriteName = petSpriteName(stage);
        if (drawSprite(spriteName, cx, cy + bounce, 36, 36)) {
          const bg = (!state.lightOn && state.sleeping) ? "#5e6a4b" : "#b9c986";
          drawPetExpression(cx, cy + bounce, stage, ink, bg);
          drawPetFeet(cx, cy + bounce, stage, ink);
          if (!state.sleeping && (moodFace() === "sad" || moodFace() === "sick")) {
            drawSprite(moodFace() === "sick" ? "emo-sick" : "emo-sad", cx + 24, cy - 12, 13, 13);
          } else if (state.sleeping) {
            drawSprite("obj-sleep", cx + 24, cy - 18, 16, 14);
          }
          return;
        }
        const sprite = getSprite(stage);
        const scale = 2;
        const width = Math.max(...sprite.map((row) => row.length)) * scale;
        const height = sprite.length * scale;
        const x = Math.round(cx - width / 2);
        const y = Math.round(cy - height / 2 + bounce);

        for (let row = 0; row < sprite.length; row += 1) {
          for (let col = 0; col < sprite[row].length; col += 1) {
            if (sprite[row][col] === "1") px(x + col * scale, y + row * scale, scale, scale, ink);
          }
        }

        const bg = (!state.lightOn && state.sleeping) ? "#5e6a4b" : "#b9c986";
        if (!state.sleeping) {
          const mood = moodFace();
          if (stage === 0) {
            drawFace(x + 11, y + 12, mood, bg, ink, 1);
          } else {
            drawFace(x + Math.round(width / 2) - 7, y + Math.round(height / 2) - 6, mood, bg, ink, 2);
          }
          if (stage === 4) drawAdultForm(x, y, width, height, ink, bg);
        } else {
          text("Z", x + width + 4, y - 3, 8, ink);
          text("z", x + width + 10, y - 10, 7, ink);
        }
      }

      function drawPetExpression(cx, cy, stage, ink, bg) {
        if (state.sleeping) return;
        const mood = moodFace();
        const blink = animationTick % 190 > 176;
        const faceY = Math.round(cy - (stage === 1 ? 2 : 5));
        const faceX = Math.round(cx - 7);

        px(faceX - 1, faceY - 1, 16, 12, ink);
        if (blink) {
          px(faceX + 1, faceY + 3, 4, 1, bg);
          px(faceX + 10, faceY + 3, 4, 1, bg);
        } else {
          px(faceX + 2, faceY + 1, 3, 4, bg);
          px(faceX + 10, faceY + 1, 3, 4, bg);
        }

        if (mood === "happy") {
          px(faceX + 5, faceY + 8, 5, 1, bg);
          px(faceX + 4, faceY + 7, 1, 1, bg);
          px(faceX + 10, faceY + 7, 1, 1, bg);
        } else if (mood === "sad" || mood === "sick") {
          px(faceX + 4, faceY + 8, 7, 1, bg);
          px(faceX + 3, faceY + 9, 1, 1, bg);
          px(faceX + 11, faceY + 9, 1, 1, bg);
        } else {
          px(faceX + 5, faceY + 8, 6, 1, bg);
        }
      }

      function drawPetFeet(cx, cy, stage, ink) {
        if (state.sleeping || stage === 0) return;
        const step = Math.floor(animationTick / 10) % 2;
        const y = Math.round(cy + (stage === 1 ? 15 : 18));
        px(cx - 13 + step * 2, y, 7, 2, ink);
        px(cx + 6 - step * 2, y, 7, 2, ink);
      }

      function petSpriteName(stage) {
        if (stage === 1) return "pet-baby";
        if (stage === 2) return "pet-child";
        if (stage === 3) return "pet-teen";
        const form = (state.form || "MAME").toLowerCase();
        if (form.includes("kuchi")) return "pet-adult-kuchi";
        if (form.includes("mask")) return "pet-adult-mask";
        if (form.includes("nyoro")) return "pet-adult-nyoro";
        return "pet-adult-mame";
      }

      function drawAdultForm(x, y, width, height, ink, bg) {
        const form = state.form || "MAME";
        if (form === "MAME") {
          px(x + 11, y - 5, 4, 7, ink);
          px(x + width - 15, y - 5, 4, 7, ink);
        } else if (form === "KUCHI") {
          px(x + Math.round(width / 2) - 4, y + Math.round(height / 2) + 7, 8, 4, bg);
          px(x + Math.round(width / 2) - 7, y + Math.round(height / 2) + 9, 14, 2, bg);
        } else if (form === "MASK") {
          px(x + Math.round(width / 2) - 13, y + Math.round(height / 2) - 8, 26, 8, bg);
          px(x + Math.round(width / 2) - 11, y + Math.round(height / 2) - 6, 7, 3, ink);
          px(x + Math.round(width / 2) + 4, y + Math.round(height / 2) - 6, 7, 3, ink);
        } else {
          px(x + 5, y + height - 4, width - 10, 2, ink);
          px(x + width - 7, y + height - 8, 5, 5, ink);
        }
      }

      function drawEgg(cx, cy, ink) {
        const wobble = animationTick % 48 < 24 ? 0 : 1;
        if (drawSprite("pet-egg", cx + wobble, cy, 30, 36)) {
          const left = Math.max(0, Math.ceil((state.hatchAt - Date.now()) / 1000));
          text(left > 0 ? `${left}` : "!", cx - 4, cy + 14, 8, ink);
          return;
        }
        const x = Math.round(cx - 13 + wobble);
        const y = Math.round(cy - 18);
        const egg = [
          "....1111....",
          "..11111111..",
          ".1111111111.",
          "111111111111",
          "111111111111",
          "111111111111",
          ".1111111111.",
          "..11111111..",
          "...111111...",
          "....1111...."
        ];
        for (let row = 0; row < egg.length; row += 1) {
          for (let col = 0; col < egg[row].length; col += 1) {
            if (egg[row][col] === "1") px(x + col * 2, y + row * 2, 2, 2, ink);
          }
        }
        px(x + 8, y + 10, 8, 2, "#b9c986");
        px(x + 12, y + 14, 10, 2, "#b9c986");
        const left = Math.max(0, Math.ceil((state.hatchAt - Date.now()) / 1000));
        text(left > 0 ? `${left}` : "!", cx - 4, cy + 14, 8, ink);
      }

      function moodFace() {
        if (state.sick || state.health < 35) return "sick";
        if (state.hunger < 25 || state.happy < 25 || state.hygiene < 25) return "sad";
        if (state.happy > 75 && state.hunger > 55) return "happy";
        return "neutral";
      }

      function drawFace(x, y, mood, bg, ink, scale) {
        const eye = scale;
        px(x, y, eye, eye, bg);
        px(x + 8, y, eye, eye, bg);
        if (mood === "happy") {
          px(x + 3, y + 5, 6, scale, bg);
          px(x + 2, y + 4, scale, scale, bg);
          px(x + 9, y + 4, scale, scale, bg);
        } else if (mood === "sad" || mood === "sick") {
          px(x + 2, y + 6, 8, scale, bg);
          px(x + 1, y + 7, scale, scale, bg);
          px(x + 10, y + 7, scale, scale, bg);
          if (mood === "sick") {
            px(x - 3, y - 3, 3, scale, bg);
            px(x + 12, y - 3, 3, scale, bg);
          }
        } else {
          px(x + 3, y + 5, 7, scale, bg);
        }
      }

      function getSprite(stage) {
        if (stage === 1) {
          return [
            "....1111....",
            "..11111111..",
            ".1111111111.",
            "111111111111",
            "111111111111",
            "111111111111",
            ".1111111111.",
            "..11111111..",
            "...11..11..."
          ];
        }
        if (stage === 2) {
          return [
            "..11......11..",
            ".1111....1111.",
            "..1111111111..",
            ".111111111111.",
            "11111111111111",
            "11111111111111",
            "11111111111111",
            ".111111111111.",
            "..1111111111..",
            "...11111111...",
            "..111.11.111..",
            ".111..11..111."
          ];
        }
        if (stage === 3) {
          return [
            "...11......11...",
            "..1111....1111..",
            "...1111111111...",
            "..111111111111..",
            ".11111111111111.",
            "1111111111111111",
            "1111111111111111",
            "1111111111111111",
            ".11111111111111.",
            "..111111111111..",
            "...1111111111...",
            "..111.1111.111..",
            ".111..1111..111.",
            "111...1111...111"
          ];
        }
        return [
          "....11........11....",
          "...1111......1111...",
          "....111111111111....",
          "...11111111111111...",
          "..1111111111111111..",
          ".111111111111111111.",
          "11111111111111111111",
          "11111111111111111111",
          "11111111111111111111",
          ".111111111111111111.",
          "..1111111111111111..",
          "...11111111111111...",
          "....111111111111....",
          "...111..1111..111...",
          "..111...1111...111..",
          ".111....1111....111.",
          "........1111........",
          ".......11..11......."
        ];
      }

      function drawStatus() {
        px(7, 20, 146, 83, "#b9c986");
        outline(7, 20, 146, 83);
        text("STATUS", 55, 24, 8);
        const page = state.page;

        if (page === 0) {
          text(`AGE ${ageMinutes()}Y`, 17, 38, 8);
          text(`WT ${state.weight}LB`, 88, 38, 8);
          heartMeter(17, 55, state.hunger, "HUN");
          heartMeter(17, 70, state.happy, "HAP");
          text(clipText(state.form || STAGES[stageIndex()], 12), 52, 86, 8);
        } else if (page === 1) {
          bar(17, 40, state.energy, "NRG");
          bar(17, 54, state.hygiene, "HYG");
          bar(17, 68, state.health, "HLT");
          bar(17, 82, state.discipline, "TRN");
        } else if (page === 2) {
          text(state.sick ? "SICK: YES" : "SICK: NO", 17, 42, 8);
          text(`MESS ${state.poop}`, 17, 56, 8);
          text(`MISS ${state.callsMissed || 0}`, 17, 70, 8);
          text(state.call ? `CALL ${callLabel(state.call.kind)}` : "CONTENT", 17, 84, 8);
        } else if (page === 3) {
          const memo = state.memories && state.memories[0];
          drawSprite("emo-heart", 28, 41, 13, 13);
          text("MEMORY", 54, 38, 8);
          text(memo ? clipText(memo.text, 17) : "NO MEMORY", 17, 56, 8);
          text(memo ? `${shortDuration(Date.now() - memo.at)} AGO` : "", 17, 70, 8);
          text(`CARE ${state.careScore || 0}`, 17, 84, 8);
        } else if (page === 4) {
          drawSprite("obj-clock", 124, 43, 14, 14);
          text(`VISIT ${state.visitCount || 0}`, 17, 42, 8);
          text(`LAST ${shortDuration(state.lastAwayMs || 0)}`, 17, 56, 8);
          text(`STREAK ${state.streakDays || 0}D`, 17, 70, 8);
          drawSprite("obj-battery", 119, 84, 15, 8);
          text(`GEN ${state.generation || 1}`, 17, 84, 8);
        } else {
          text("LEGACY", 55, 38, 8);
          text(`BEST ${state.bestAgeMinutes || 0}Y`, 17, 54, 8);
          text(`ANS ${state.callsAnswered || 0}`, 17, 68, 8);
          text(clipText(state.lastForm ? `LAST ${state.lastForm}` : `LONG ${shortDuration(state.longestAwayMs || 0)}`, 17), 17, 82, 8);
        }
      }

      function drawFood() {
        px(24, 30, 112, 58, "#b9c986");
        outline(24, 30, 112, 58);
        text("FOOD", 62, 36, 9);
        text(state.foodIndex === 0 ? ">" : " ", 39, 54, 9);
        text("MEAL", 52, 54, 9);
        drawSprite("obj-meal", 108, 58, 15, 11);
        text(state.foodIndex === 1 ? ">" : " ", 39, 69, 9);
        text("SNACK", 52, 69, 9);
        drawSprite("obj-snack", 110, 73, 15, 10);
      }

      function drawGame() {
        const game = state.game;
        if (!game) return;
        px(9, 20, 142, 88, "#b9c986");
        outline(9, 20, 142, 88);
        text(game.kind === "number" ? "HIGH LOW" : "DIRECTION", 42, 25, 8);
        text(`${game.round}/5`, 18, 38, 8);
        text(`SCORE ${game.score}`, 82, 38, 8);

        if (game.kind === "number") {
          text(`${game.current}`, 73, 52, 20);
          text(game.pick === 0 ? ">HI" : " HI", 41, 82, 9);
          text(game.pick === 1 ? ">LO" : " LO", 91, 82, 9);
          if (game.reveal) {
            text(`${game.next}`, 109, 53, 14);
            text(game.result, 62, 68, 9);
          } else {
            text("NEXT?", 58, 68, 9);
          }
          return;
        }

        drawDirectionPick(42, 66, game.pick === 0, game.reveal && game.target === 0, "left");
        drawDirectionPick(104, 66, game.pick === 1, game.reveal && game.target === 1, "right");
        text("L", 48, 91, 8);
        text("R", 110, 91, 8);

        if (game.reveal) {
          text(game.result, 66, 49, 9);
        } else {
          text("PICK", 65, 49, 9);
        }
      }

      function drawDirectionPick(x, y, selected, target, direction) {
        if (selected) {
          px(x - 17, y - 17, 34, 34);
          px(x - 15, y - 15, 30, 30, "#b9c986");
        }
        const sprite = direction === "left" ? "game-arrow-left" : "game-arrow-right";
        if (!drawSprite(sprite, x, y, 20, 18)) {
          if (direction === "left") {
            px(x - 10, y - 2, 16, 4);
            px(x - 12, y - 5, 5, 10);
          } else {
            px(x - 6, y - 2, 16, 4);
            px(x + 7, y - 5, 5, 10);
          }
        }
        if (target) drawSprite("game-star", x, y - 15, 13, 13);
      }

      function drawCup(x, y, selected, hasStar) {
        if (selected) {
          px(x - 5, y - 5, 34, 34);
          px(x - 3, y - 3, 30, 30, "#b9c986");
        }
        const cupName = x < 60 ? "game-cup-left" : "game-cup-right";
        if (drawSprite(cupName, x + 12, y + 12, 22, 20)) {
          if (hasStar) drawSprite("game-star", x + 12, y + 10, 14, 14);
          return;
        }
        px(x + 3, y, 18, 4);
        px(x + 1, y + 4, 22, 15);
        px(x + 4, y + 19, 16, 3);
        if (hasStar) {
          px(x + 10, y + 7, 4, 11, "#b9c986");
          px(x + 6, y + 11, 12, 3, "#b9c986");
        }
      }

      function drawMessage(dim) {
        const now = Date.now();
        const hasMessage = state.message && state.messageUntil > now;
        const label = hasMessage ? state.message : (state.mode === "idle" ? menus[state.menuIndex].label : "");
        if (!label) return;
        const ink = dim ? "#2f3828" : "#2a3420";
        const bg = dim ? "#5e6a4b" : "#b9c986";
        px(4, 111, 116, 15, bg);
        outline(4, 111, 116, 15, ink);
        text(label, 9, 115, 8, ink);
      }

      function loop() {
        draw();
        requestAnimationFrame(loop);
      }

      document.querySelectorAll(".control").forEach((button) => {
        const key = button.dataset.key;
        button.addEventListener("pointerdown", () => {
          heldKeys.add(key);
          button.classList.add("is-down");
          press(key);
        });
        button.addEventListener("pointerup", () => {
          heldKeys.delete(key);
          button.classList.remove("is-down");
        });
        button.addEventListener("pointerleave", () => {
          heldKeys.delete(key);
          button.classList.remove("is-down");
        });
        button.addEventListener("pointercancel", () => {
          heldKeys.delete(key);
          button.classList.remove("is-down");
        });
      });

      document.addEventListener("keydown", (event) => {
        const map = {
          ArrowLeft: "a",
          ArrowRight: "a",
          Enter: "b",
          " ": "b",
          Escape: "c",
          Backspace: "c"
        };
        const key = map[event.key];
        if (!key) return;
        event.preventDefault();
        heldKeys.add(key);
        const button = document.querySelector(`[data-key="${key}"]`);
        if (button) button.classList.add("is-down");
        press(key);
      });

      document.addEventListener("keyup", (event) => {
        const map = {
          ArrowLeft: "a",
          ArrowRight: "a",
          Enter: "b",
          " ": "b",
          Escape: "c",
          Backspace: "c"
        };
        const key = map[event.key];
        if (key) heldKeys.delete(key);
        document.querySelectorAll(".control").forEach((button) => button.classList.remove("is-down"));
      });

      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "hidden") {
          save();
        } else {
          registerVisit();
          applyTime();
          save();
        }
      });

      window.addEventListener("beforeunload", save);
      if (typeof navigator !== "undefined" && "serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch(() => {});
        });
      }
      loop();
    })();
  </script>
</body>
</html>
