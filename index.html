<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tamaguchi</title>
  <style>
    :root {
      --shell: #f05f5f;
      --shell-dark: #9f343a;
      --shell-light: #ff9d88;
      --screen: #b9c986;
      --screen-dark: #2a3420;
      --screen-dim: #6f7f55;
      --cream: #fff7da;
      --button: #f8d64e;
      --button-dark: #a2701f;
      --ink: #211d18;
      --shadow: rgba(19, 15, 10, 0.28);
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow-x: hidden;
      background:
        linear-gradient(45deg, rgba(33, 29, 24, 0.08) 25%, transparent 25%) 0 0 / 24px 24px,
        linear-gradient(45deg, transparent 75%, rgba(33, 29, 24, 0.08) 75%) 0 0 / 24px 24px,
        linear-gradient(45deg, transparent 75%, rgba(33, 29, 24, 0.08) 75%) 12px 12px / 24px 24px,
        linear-gradient(45deg, rgba(33, 29, 24, 0.08) 25%, transparent 25%) 12px 12px / 24px 24px,
        #9dcbd0;
      color: var(--ink);
      font-family: "Courier New", Consolas, monospace;
      padding: 22px;
    }

    .wrap {
      width: min(94vw, 520px);
      display: grid;
      justify-items: center;
      gap: 12px;
    }

    .device {
      position: relative;
      width: min(94vw, 440px);
      aspect-ratio: 0.78;
      border-radius: 46% 46% 50% 50% / 35% 35% 58% 58%;
      background:
        radial-gradient(circle at 50% 20%, var(--shell-light), transparent 0 17%, transparent 18%),
        linear-gradient(145deg, var(--shell-light), var(--shell) 42%, var(--shell-dark));
      border: 8px solid #6f2a2e;
      box-shadow:
        0 28px 0 #6f2a2e,
        0 36px 34px var(--shadow),
        inset -16px -20px 0 rgba(94, 20, 27, 0.18),
        inset 12px 16px 0 rgba(255, 255, 255, 0.2);
      display: grid;
      grid-template-rows: 86px auto 128px;
      align-items: start;
      justify-items: center;
      padding: 24px 30px 28px;
    }

    .chain {
      position: absolute;
      top: -30px;
      width: 74px;
      height: 50px;
      border: 8px solid #6f2a2e;
      border-bottom: 0;
      border-radius: 45px 45px 0 0;
      background: transparent;
    }

    .brand {
      align-self: end;
      margin-bottom: 8px;
      padding: 6px 12px;
      color: var(--cream);
      text-shadow: 2px 2px 0 #6f2a2e;
      font-weight: 900;
      letter-spacing: 0;
      font-size: clamp(1.55rem, 7vw, 2.55rem);
      line-height: 1;
    }

    .screen-bezel {
      width: min(90%, 350px);
      padding: 16px;
      border: 6px solid #6f2a2e;
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.35), transparent 28%),
        #f5db6c;
      box-shadow:
        inset 0 0 0 4px #d0922e,
        0 8px 0 rgba(95, 38, 35, 0.42);
    }

    .screen {
      width: 100%;
      aspect-ratio: 5 / 4;
      border: 5px solid var(--screen-dark);
      border-radius: 4px;
      background: var(--screen);
      box-shadow:
        inset 0 0 0 3px rgba(42, 52, 32, 0.2),
        inset 0 10px 0 rgba(255, 255, 255, 0.12);
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: var(--screen);
    }

    .controls {
      width: min(86%, 320px);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      align-self: end;
      margin-bottom: 5px;
    }

    .control {
      border: 0;
      border-radius: 50%;
      aspect-ratio: 1;
      background:
        radial-gradient(circle at 35% 28%, #fff3a6, transparent 0 18%, transparent 19%),
        linear-gradient(145deg, #ffe87a, var(--button));
      color: #5c3013;
      font: 900 clamp(1.1rem, 5vw, 1.65rem) / 1 "Courier New", Consolas, monospace;
      box-shadow:
        inset -8px -10px 0 rgba(162, 112, 31, 0.4),
        0 9px 0 var(--button-dark),
        0 15px 16px rgba(87, 39, 24, 0.24);
      cursor: pointer;
      touch-action: manipulation;
    }

    .control:active,
    .control.is-down {
      transform: translateY(6px);
      box-shadow:
        inset -6px -7px 0 rgba(162, 112, 31, 0.4),
        0 3px 0 var(--button-dark),
        0 8px 10px rgba(87, 39, 24, 0.22);
    }

    .labels {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      width: min(86%, 320px);
      margin-top: -2px;
      color: #fff7da;
      font-weight: 900;
      text-align: center;
      text-shadow: 1px 2px 0 #6f2a2e;
      font-size: clamp(0.7rem, 2.5vw, 0.86rem);
    }

    .hint {
      max-width: 470px;
      color: rgba(33, 29, 24, 0.78);
      font-weight: 700;
      text-align: center;
      line-height: 1.5;
      font-size: clamp(0.78rem, 3vw, 0.95rem);
    }

    @media (max-width: 440px) {
      body {
        padding: 12px;
      }

      .device {
        grid-template-rows: 68px auto 112px;
        padding: 18px 20px 22px;
        border-width: 6px;
        box-shadow:
          0 18px 0 #6f2a2e,
          0 28px 28px var(--shadow),
          inset -11px -15px 0 rgba(94, 20, 27, 0.18),
          inset 8px 11px 0 rgba(255, 255, 255, 0.2);
      }

      .screen-bezel {
        padding: 12px;
        border-width: 5px;
      }

      .controls,
      .labels {
        gap: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="device" aria-label="Tamaguchi virtual pet">
      <div class="chain" aria-hidden="true"></div>
      <div class="brand">TAMAGUCHI</div>
      <div class="screen-bezel">
        <div class="screen">
          <canvas id="game" width="160" height="128" aria-label="Tamaguchi game screen"></canvas>
        </div>
      </div>
      <div class="controls" aria-label="Game controls">
        <button class="control" data-key="a" aria-label="A select">A</button>
        <button class="control" data-key="b" aria-label="B confirm">B</button>
        <button class="control" data-key="c" aria-label="C cancel">C</button>
      </div>
      <div class="labels" aria-hidden="true">
        <span>SELECT</span>
        <span>OK</span>
        <span>BACK</span>
      </div>
    </section>
    <p class="hint">A cycles icons. B uses one. C returns. Keyboard: Left, Enter, Esc.</p>
  </main>

  <script>
    (() => {
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width;
      const H = canvas.height;
      const SAVE_KEY = "tamaguchi.save.v1";
      const TICK_SECONDS = 12;
      const POOP_SECONDS = 80;
      const STAGES = ["BABY", "CHILD", "TEEN", "ADULT"];

      const menus = [
        { key: "status", label: "STAT" },
        { key: "food", label: "FOOD" },
        { key: "play", label: "GAME" },
        { key: "clean", label: "CLEAN" },
        { key: "med", label: "MED" },
        { key: "light", label: "LIGHT" },
        { key: "discipline", label: "TRAIN" },
        { key: "attention", label: "CALL" }
      ];

      const defaults = () => ({
        bornAt: Date.now(),
        lastTick: Date.now(),
        lastPoop: Date.now(),
        hunger: 72,
        happy: 70,
        energy: 78,
        hygiene: 85,
        health: 90,
        discipline: 12,
        weight: 5,
        poop: 0,
        sick: false,
        sleeping: false,
        lightOn: true,
        careMisses: 0,
        menuIndex: 0,
        mode: "idle",
        page: 0,
        foodIndex: 0,
        message: "HELLO!",
        messageUntil: Date.now() + 2500,
        game: null
      });

      let state = load();
      let animationTick = 0;

      function load() {
        try {
          const saved = JSON.parse(localStorage.getItem(SAVE_KEY));
          return { ...defaults(), ...saved, mode: "idle", game: null, message: "I'M BACK!", messageUntil: Date.now() + 1800 };
        } catch {
          return defaults();
        }
      }

      function save() {
        const saved = { ...state, game: null, mode: "idle" };
        localStorage.setItem(SAVE_KEY, JSON.stringify(saved));
      }

      function clamp(value, min = 0, max = 100) {
        return Math.max(min, Math.min(max, value));
      }

      function stat(value, delta) {
        return clamp(Math.round(value + delta));
      }

      function ageMinutes() {
        return Math.max(0, Math.floor((Date.now() - state.bornAt) / 60000));
      }

      function stageIndex() {
        const age = ageMinutes();
        if (age < 2) return 0;
        if (age < 8) return 1;
        if (age < 18) return 2;
        return 3;
      }

      function setMessage(text, duration = 1700) {
        state.message = text;
        state.messageUntil = Date.now() + duration;
      }

      function getNeedCount() {
        return [
          state.hunger < 25,
          state.happy < 25,
          state.energy < 18,
          state.hygiene < 25,
          state.health < 45,
          state.poop > 0,
          state.sick
        ].filter(Boolean).length;
      }

      function applyTime() {
        const now = Date.now();
        const elapsed = Math.max(0, Math.min(now - state.lastTick, 1000 * 60 * 60 * 3));
        const units = Math.floor(elapsed / (TICK_SECONDS * 1000));

        if (units > 0) {
          for (let i = 0; i < units; i += 1) {
            const sleepBoost = state.sleeping || !state.lightOn;
            state.hunger = stat(state.hunger, -1);
            state.happy = stat(state.happy, sleepBoost ? -0.2 : -0.8);
            state.hygiene = stat(state.hygiene, state.poop > 0 ? -1.6 : -0.55);
            state.energy = stat(state.energy, sleepBoost ? 2.4 : -0.65);

            if (state.hunger < 20 || state.hygiene < 20 || state.happy < 15) {
              state.health = stat(state.health, -1.5);
              state.careMisses += 1;
            } else if (!state.sick && state.health < 96) {
              state.health = stat(state.health, 0.35);
            }

            if (state.energy >= 96 && state.sleeping) {
              state.sleeping = false;
              state.lightOn = true;
              setMessage("GOOD MORN", 1800);
            }
          }

          state.lastTick += units * TICK_SECONDS * 1000;
        }

        const poopUnits = Math.floor(Math.max(0, now - state.lastPoop) / (POOP_SECONDS * 1000));
        if (poopUnits > 0) {
          state.poop = Math.min(4, state.poop + poopUnits);
          state.lastPoop += poopUnits * POOP_SECONDS * 1000;
        }

        if (!state.sick && (state.health < 35 || (state.poop >= 3 && Math.random() < 0.02))) {
          state.sick = true;
          setMessage("SICK!", 2200);
        }

        if (!state.sleeping && state.energy < 8) {
          state.sleeping = true;
          setMessage("SLEEPY", 1800);
        }
      }

      function press(key) {
        applyTime();

        if (key === "c") {
          if (state.mode !== "idle") {
            state.mode = "idle";
            state.game = null;
            setMessage(menus[state.menuIndex].label, 900);
          } else {
            state.messageUntil = 0;
          }
          save();
          draw();
          return;
        }

        if (state.mode === "idle") {
          if (key === "a") {
            state.menuIndex = (state.menuIndex + 1) % menus.length;
            setMessage(menus[state.menuIndex].label, 900);
          } else if (key === "b") {
            activateMenu(menus[state.menuIndex].key);
          }
        } else if (state.mode === "status") {
          if (key === "a" || key === "b") {
            state.page = (state.page + 1) % 3;
          }
        } else if (state.mode === "food") {
          if (key === "a") {
            state.foodIndex = state.foodIndex === 0 ? 1 : 0;
          } else if (key === "b") {
            feed(state.foodIndex);
          }
        } else if (state.mode === "game") {
          playInput(key);
        }

        save();
        draw();
      }

      function activateMenu(key) {
        switch (key) {
          case "status":
            state.mode = "status";
            state.page = 0;
            break;
          case "food":
            state.mode = "food";
            state.foodIndex = 0;
            break;
          case "play":
            startGame();
            break;
          case "clean":
            clean();
            break;
          case "med":
            medicate();
            break;
          case "light":
            toggleLight();
            break;
          case "discipline":
            discipline();
            break;
          case "attention":
            attention();
            break;
          default:
            break;
        }
      }

      function feed(index) {
        if (state.sleeping) {
          setMessage("ZZZ...", 1200);
          return;
        }

        if (index === 0) {
          if (state.hunger > 94) {
            setMessage("FULL", 1300);
            return;
          }
          state.hunger = stat(state.hunger, 24);
          state.happy = stat(state.happy, 3);
          state.weight = Math.min(99, state.weight + 1);
          setMessage("MEAL", 1300);
        } else {
          state.hunger = stat(state.hunger, 8);
          state.happy = stat(state.happy, 16);
          state.health = stat(state.health, state.health > 55 ? -1 : 0);
          state.weight = Math.min(99, state.weight + 2);
          setMessage("SNACK", 1300);
        }
        state.mode = "idle";
      }

      function clean() {
        if (state.poop > 0) {
          state.poop = 0;
          state.hygiene = stat(state.hygiene, 34);
          state.happy = stat(state.happy, 5);
          setMessage("CLEAN!", 1600);
        } else {
          state.hygiene = stat(state.hygiene, 18);
          state.happy = stat(state.happy, -1);
          setMessage("BATH", 1400);
        }
      }

      function medicate() {
        if (state.sick || state.health < 60) {
          state.sick = false;
          state.health = stat(state.health, 34);
          state.happy = stat(state.happy, -4);
          setMessage("MED OK", 1600);
        } else {
          setMessage("NO NEED", 1400);
        }
      }

      function toggleLight() {
        state.lightOn = !state.lightOn;
        if (!state.lightOn) {
          state.sleeping = true;
          state.energy = stat(state.energy, 3);
          setMessage("LIGHT OFF", 1600);
        } else {
          if (state.energy > 35) state.sleeping = false;
          setMessage("LIGHT ON", 1600);
        }
      }

      function discipline() {
        const needsAttention = getNeedCount() > 0;
        if (needsAttention) {
          state.discipline = stat(state.discipline, 8);
          state.happy = stat(state.happy, -3);
          setMessage("TRAINED", 1600);
        } else {
          state.happy = stat(state.happy, -8);
          state.discipline = stat(state.discipline, 3);
          setMessage("HEY!", 1300);
        }
      }

      function attention() {
        const needs = [];
        if (state.hunger < 25) needs.push("FOOD");
        if (state.happy < 25) needs.push("GAME");
        if (state.energy < 18) needs.push("LIGHT");
        if (state.hygiene < 25 || state.poop > 0) needs.push("CLEAN");
        if (state.health < 45 || state.sick) needs.push("MED");
        setMessage(needs.length ? needs.slice(0, 2).join("+") : "OK!", 2200);
      }

      function startGame() {
        if (state.sleeping) {
          setMessage("ZZZ...", 1200);
          return;
        }
        if (state.energy < 10) {
          setMessage("TIRED", 1300);
          return;
        }
        state.mode = "game";
        state.game = {
          round: 1,
          score: 0,
          pick: 0,
          target: Math.random() < 0.5 ? 0 : 1,
          reveal: false,
          result: ""
        };
      }

      function playInput(key) {
        const game = state.game;
        if (!game) return;

        if (key === "a" && !game.reveal) {
          game.pick = game.pick === 0 ? 1 : 0;
        }

        if (key === "b" && !game.reveal) {
          const win = game.pick === game.target;
          game.reveal = true;
          game.result = win ? "HIT!" : "MISS";
          if (win) game.score += 1;
          setTimeout(() => {
            if (state.mode !== "game" || !state.game) return;
            if (state.game.round >= 5) {
              const score = state.game.score;
              state.happy = stat(state.happy, score * 5 + (score >= 3 ? 10 : 0));
              state.energy = stat(state.energy, -8);
              state.weight = Math.max(2, state.weight - (score >= 3 ? 1 : 0));
              setMessage(`SCORE ${score}/5`, 2100);
              state.mode = "idle";
              state.game = null;
              save();
              draw();
              return;
            }
            state.game.round += 1;
            state.game.pick = 0;
            state.game.target = Math.random() < 0.5 ? 0 : 1;
            state.game.reveal = false;
            state.game.result = "";
            draw();
          }, 950);
        }
      }

      function px(x, y, w = 1, h = 1, color = "#2a3420") {
        ctx.fillStyle = color;
        ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h));
      }

      function outline(x, y, w, h, color = "#2a3420") {
        px(x, y, w, 1, color);
        px(x, y + h - 1, w, 1, color);
        px(x, y, 1, h, color);
        px(x + w - 1, y, 1, h, color);
      }

      function text(value, x, y, size = 8, color = "#2a3420", align = "left") {
        ctx.fillStyle = color;
        ctx.font = `bold ${size}px "Courier New", monospace`;
        ctx.textBaseline = "top";
        ctx.textAlign = align;
        ctx.fillText(String(value).toUpperCase(), Math.round(x), Math.round(y));
        ctx.textAlign = "left";
      }

      function bar(x, y, value, label) {
        text(label, x, y - 1, 7);
        outline(x + 34, y, 45, 7);
        const fill = Math.max(0, Math.round(value / 100 * 41));
        for (let i = 0; i < fill; i += 4) px(x + 36 + i, y + 2, 2, 3);
      }

      function draw() {
        applyTime();
        animationTick += 1;
        const dim = !state.lightOn && state.sleeping;
        ctx.clearRect(0, 0, W, H);
        px(0, 0, W, H, dim ? "#5e6a4b" : "#b9c986");

        if (!dim) {
          for (let y = 0; y < H; y += 4) px(0, y, W, 1, "rgba(42, 52, 32, 0.08)");
        }

        drawTopIcons(dim);
        drawRoom(dim);

        if (state.mode === "status") drawStatus();
        if (state.mode === "food") drawFood();
        if (state.mode === "game") drawGame();

        drawMessage(dim);
      }

      function drawTopIcons(dim) {
        const ink = dim ? "#2f3828" : "#2a3420";
        const bg = dim ? "#5e6a4b" : "#b9c986";
        for (let i = 0; i < menus.length; i += 1) {
          const x = 3 + i * 19;
          const active = state.mode === "idle" && state.menuIndex === i;
          if (active) {
            px(x - 1, 1, 17, 14, ink);
          } else {
            outline(x - 1, 1, 17, 14, ink);
          }
          drawIcon(menus[i].key, x + 1, 3, active ? bg : ink);
        }

        if (getNeedCount() > 0 && (animationTick % 32 < 16)) {
          px(151, 3, 5, 9, ink);
          px(153, 12, 2, 2, ink);
        }
      }

      function drawIcon(key, x, y, color) {
        const c = color;
        if (key === "status") {
          px(x, y + 8, 3, 3, c);
          px(x + 5, y + 5, 3, 6, c);
          px(x + 10, y + 2, 3, 9, c);
        }
        if (key === "food") {
          px(x + 2, y + 8, 10, 2, c);
          px(x + 4, y + 10, 6, 2, c);
          px(x + 5, y + 3, 4, 4, c);
          px(x + 8, y + 2, 2, 2, c);
        }
        if (key === "play") {
          px(x + 2, y + 5, 11, 5, c);
          px(x, y + 7, 15, 2, c);
          px(x + 4, y + 3, 2, 9, c);
          px(x + 9, y + 6, 2, 2, c);
          px(x + 12, y + 4, 2, 2, c);
        }
        if (key === "clean") {
          px(x + 2, y + 3, 10, 2, c);
          px(x + 4, y + 5, 6, 8, c);
          px(x + 3, y + 12, 8, 2, c);
        }
        if (key === "med") {
          px(x + 5, y + 2, 4, 11, c);
          px(x + 1, y + 6, 12, 4, c);
        }
        if (key === "light") {
          px(x + 4, y + 2, 7, 7, c);
          px(x + 5, y + 9, 5, 3, c);
          px(x + 6, y + 12, 3, 2, c);
        }
        if (key === "discipline") {
          px(x + 6, y + 2, 3, 8, c);
          px(x + 5, y + 11, 5, 3, c);
        }
        if (key === "attention") {
          px(x + 3, y + 3, 9, 9, c);
          px(x + 5, y + 5, 2, 2, color === "#2a3420" ? "#b9c986" : "#2a3420");
          px(x + 9, y + 5, 2, 2, color === "#2a3420" ? "#b9c986" : "#2a3420");
          px(x + 6, y + 10, 5, 1, color === "#2a3420" ? "#b9c986" : "#2a3420");
        }
      }

      function drawRoom(dim) {
        const ink = dim ? "#2f3828" : "#2a3420";
        if (!state.lightOn && state.sleeping) {
          text("ZZZ", 15, 31, 9, ink);
        }

        for (let x = 0; x < W; x += 6) px(x, 101, 3, 1, ink);
        px(0, 106, W, 1, ink);

        for (let i = 0; i < state.poop; i += 1) {
          drawPoop(12 + i * 12, 91, ink);
        }

        drawPet(75, 66, ink);

        if (state.sick) {
          px(112, 45, 5, 5, ink);
          px(114, 40, 1, 13, ink);
          px(110, 44, 9, 1, ink);
        }

        const clock = new Date();
        const hours = String(clock.getHours()).padStart(2, "0");
        const minutes = String(clock.getMinutes()).padStart(2, "0");
        text(`${hours}:${minutes}`, 123, 113, 7, ink);
      }

      function drawPoop(x, y, ink) {
        px(x + 5, y, 4, 2, ink);
        px(x + 3, y + 2, 8, 3, ink);
        px(x + 1, y + 5, 12, 3, ink);
        px(x, y + 8, 14, 3, ink);
      }

      function drawPet(cx, cy, ink) {
        const stage = stageIndex();
        const bounce = state.sleeping ? 0 : (animationTick % 34 < 17 ? 0 : 1);
        const sprite = getSprite(stage);
        const scale = stage === 0 ? 2 : 2;
        const width = Math.max(...sprite.map((row) => row.length)) * scale;
        const height = sprite.length * scale;
        const x = Math.round(cx - width / 2);
        const y = Math.round(cy - height / 2 + bounce);

        for (let row = 0; row < sprite.length; row += 1) {
          for (let col = 0; col < sprite[row].length; col += 1) {
            if (sprite[row][col] === "1") px(x + col * scale, y + row * scale, scale, scale, ink);
          }
        }

        const bg = (!state.lightOn && state.sleeping) ? "#5e6a4b" : "#b9c986";
        if (!state.sleeping) {
          const mood = moodFace();
          if (stage === 0) {
            drawFace(x + 11, y + 12, mood, bg, ink, 1);
          } else {
            drawFace(x + Math.round(width / 2) - 7, y + Math.round(height / 2) - 6, mood, bg, ink, 2);
          }
        } else {
          text("Z", x + width + 4, y - 3, 8, ink);
          text("z", x + width + 10, y - 10, 7, ink);
        }
      }

      function moodFace() {
        if (state.sick || state.health < 35) return "sick";
        if (state.hunger < 25 || state.happy < 25 || state.hygiene < 25) return "sad";
        if (state.happy > 75 && state.hunger > 55) return "happy";
        return "neutral";
      }

      function drawFace(x, y, mood, bg, ink, scale) {
        const eye = scale;
        px(x, y, eye, eye, bg);
        px(x + 8, y, eye, eye, bg);
        if (mood === "happy") {
          px(x + 3, y + 5, 6, scale, bg);
          px(x + 2, y + 4, scale, scale, bg);
          px(x + 9, y + 4, scale, scale, bg);
        } else if (mood === "sad" || mood === "sick") {
          px(x + 2, y + 6, 8, scale, bg);
          px(x + 1, y + 7, scale, scale, bg);
          px(x + 10, y + 7, scale, scale, bg);
          if (mood === "sick") {
            px(x - 3, y - 3, 3, scale, bg);
            px(x + 12, y - 3, 3, scale, bg);
          }
        } else {
          px(x + 3, y + 5, 7, scale, bg);
        }
      }

      function getSprite(stage) {
        if (stage === 0) {
          return [
            "....1111....",
            "..11111111..",
            ".1111111111.",
            "111111111111",
            "111111111111",
            "111111111111",
            ".1111111111.",
            "..11111111..",
            "...11..11..."
          ];
        }
        if (stage === 1) {
          return [
            "..11......11..",
            ".1111....1111.",
            "..1111111111..",
            ".111111111111.",
            "11111111111111",
            "11111111111111",
            "11111111111111",
            ".111111111111.",
            "..1111111111..",
            "...11111111...",
            "..111.11.111..",
            ".111..11..111."
          ];
        }
        if (stage === 2) {
          return [
            "...11......11...",
            "..1111....1111..",
            "...1111111111...",
            "..111111111111..",
            ".11111111111111.",
            "1111111111111111",
            "1111111111111111",
            "1111111111111111",
            ".11111111111111.",
            "..111111111111..",
            "...1111111111...",
            "..111.1111.111..",
            ".111..1111..111.",
            "111...1111...111"
          ];
        }
        return [
          "....11........11....",
          "...1111......1111...",
          "....111111111111....",
          "...11111111111111...",
          "..1111111111111111..",
          ".111111111111111111.",
          "11111111111111111111",
          "11111111111111111111",
          "11111111111111111111",
          ".111111111111111111.",
          "..1111111111111111..",
          "...11111111111111...",
          "....111111111111....",
          "...111..1111..111...",
          "..111...1111...111..",
          ".111....1111....111.",
          "........1111........",
          ".......11..11......."
        ];
      }

      function drawStatus() {
        px(7, 20, 146, 83, "#b9c986");
        outline(7, 20, 146, 83);
        text("STATUS", 55, 24, 8);
        const page = state.page;

        if (page === 0) {
          text(`AGE ${ageMinutes()}Y`, 17, 38, 8);
          text(`WT ${state.weight}LB`, 88, 38, 8);
          bar(17, 55, state.hunger, "HUN");
          bar(17, 69, state.happy, "HAP");
          text(`${STAGES[stageIndex()]}`, 58, 86, 8);
        } else if (page === 1) {
          bar(17, 40, state.energy, "NRG");
          bar(17, 54, state.hygiene, "HYG");
          bar(17, 68, state.health, "HLT");
          bar(17, 82, state.discipline, "TRN");
        } else {
          text(state.sick ? "SICK: YES" : "SICK: NO", 17, 42, 8);
          text(`MESS ${state.poop}`, 17, 56, 8);
          text(`MISS ${state.careMisses}`, 17, 70, 8);
          text(getNeedCount() > 0 ? "CALLING!" : "CONTENT", 17, 84, 8);
        }
      }

      function drawFood() {
        px(24, 30, 112, 58, "#b9c986");
        outline(24, 30, 112, 58);
        text("FOOD", 62, 36, 9);
        text(state.foodIndex === 0 ? ">" : " ", 39, 54, 9);
        text("MEAL", 52, 54, 9);
        text(state.foodIndex === 1 ? ">" : " ", 39, 69, 9);
        text("SNACK", 52, 69, 9);
      }

      function drawGame() {
        const game = state.game;
        if (!game) return;
        px(9, 20, 142, 88, "#b9c986");
        outline(9, 20, 142, 88);
        text(`GAME ${game.round}/5`, 48, 25, 8);
        text(`SCORE ${game.score}`, 48, 36, 8);

        drawCup(38, 61, game.pick === 0, game.reveal && game.target === 0);
        drawCup(96, 61, game.pick === 1, game.reveal && game.target === 1);
        text("L", 48, 91, 8);
        text("R", 106, 91, 8);

        if (game.reveal) {
          text(game.result, 66, 49, 9);
        } else {
          text("PICK", 65, 49, 9);
        }
      }

      function drawCup(x, y, selected, hasStar) {
        if (selected) {
          px(x - 5, y - 5, 34, 34);
          px(x - 3, y - 3, 30, 30, "#b9c986");
        }
        px(x + 3, y, 18, 4);
        px(x + 1, y + 4, 22, 15);
        px(x + 4, y + 19, 16, 3);
        if (hasStar) {
          px(x + 10, y + 7, 4, 11, "#b9c986");
          px(x + 6, y + 11, 12, 3, "#b9c986");
        }
      }

      function drawMessage(dim) {
        const now = Date.now();
        const hasMessage = state.message && state.messageUntil > now;
        const label = hasMessage ? state.message : (state.mode === "idle" ? menus[state.menuIndex].label : "");
        if (!label) return;
        const ink = dim ? "#2f3828" : "#2a3420";
        const bg = dim ? "#5e6a4b" : "#b9c986";
        px(4, 111, 116, 15, bg);
        outline(4, 111, 116, 15, ink);
        text(label, 9, 115, 8, ink);
      }

      function loop() {
        draw();
        requestAnimationFrame(loop);
      }

      document.querySelectorAll(".control").forEach((button) => {
        const key = button.dataset.key;
        button.addEventListener("pointerdown", () => {
          button.classList.add("is-down");
          press(key);
        });
        button.addEventListener("pointerup", () => button.classList.remove("is-down"));
        button.addEventListener("pointerleave", () => button.classList.remove("is-down"));
      });

      document.addEventListener("keydown", (event) => {
        const map = {
          ArrowLeft: "a",
          ArrowRight: "a",
          Enter: "b",
          " ": "b",
          Escape: "c",
          Backspace: "c"
        };
        const key = map[event.key];
        if (!key) return;
        event.preventDefault();
        const button = document.querySelector(`[data-key="${key}"]`);
        if (button) button.classList.add("is-down");
        press(key);
      });

      document.addEventListener("keyup", () => {
        document.querySelectorAll(".control").forEach((button) => button.classList.remove("is-down"));
      });

      window.addEventListener("beforeunload", save);
      loop();
    })();
  </script>
</body>
</html>
